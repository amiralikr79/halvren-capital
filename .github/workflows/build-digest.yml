name: Build Halvren Digest

# Runs the AI ingestion pipeline that updates the weekly /digest.
#
# To enable:
#   1. Add ANTHROPIC_API_KEY as a repo secret (Settings → Secrets → Actions)
#   2. Set permissions: this workflow needs `contents: write` to commit JSON
#   3. (Optional) Adjust the cron schedule below
#
# Until the secret is added, the scheduled runs will no-op cleanly:
# the script will skip extraction and the file won't change.

on:
  schedule:
    # Mondays at 12:00 UTC (≈ 8am ET / 5am PT) — after the Friday earnings
    # week + weekend filings have settled. Saves Friday-evening trafffic spikes.
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days"
        required: false
        default: "7"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: build-digest
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --quiet "anthropic>=0.40"

      - name: Run ingest + render
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DAYS="${{ github.event.inputs.days || 7 }}"
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — re-rendering only"
            python scripts/build_digest.py --render
          else
            python scripts/build_digest.py --ingest --days "$DAYS"
          fi

      - name: Commit + push if changed
        run: |
          git config user.name  "halvren-bot"
          git config user.email "amirali@halvrencapital.com"
          if git diff --quiet data/digest-week.json digest.html; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git add data/digest-week.json digest.html
          STAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "digest: weekly ingest ${STAMP}

          Auto-generated by .github/workflows/build-digest.yml
          See scripts/README.md for the pipeline."
          git push
